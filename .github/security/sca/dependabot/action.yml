name: 'Dependabot Alert Inspector'
description: 'Check for active Dependabot alerts and report them'
inputs:
  pr_id:
    description: 'Pull request ID for commenting results'
    required: false
  github_token:
    description: 'GitHub token for authentication'
    required: true
  fail_threshold:
    description: 'Minimum severity level to fail the action (critical, high, medium, low). Use "none" (default) to run in informational mode and never fail.'
    default: 'none'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Fetch Dependabot Alerts
      shell: bash
      id: fetch
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
      run: |
        echo "Fetching Dependabot alerts for $REPO..."
        # gh api --paginate --slurp returns an array of pages; flatten to a single array of alerts.
        if ! gh api "repos/$REPO/dependabot/alerts?state=open&per_page=100" --paginate --slurp > dependabot-pages.json; then
          echo "[]" > dependabot-alerts.json
        else
          jq 'flatten' dependabot-pages.json > dependabot-alerts.json || echo "[]" > dependabot-alerts.json
        fi
        rm -f dependabot-pages.json
        
    - name: Format Dependabot Alerts Result
      shell: bash
      id: format
      env:
        FAIL_THRESHOLD: ${{ inputs.fail_threshold }}
      run: |
        if [ ! -f dependabot-alerts.json ] || [ ! -s dependabot-alerts.json ] || [ "$(cat dependabot-alerts.json)" == "[]" ]; then
          echo "### ✅ No Dependabot alerts detected" > formatted-results.md
          echo "should_fail=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Filter alerts based on threshold. "none" means informational only — never fail.
        case "$FAIL_THRESHOLD" in
          none)     FILTER="false" ;;
          critical) FILTER=".severity == \"critical\"" ;;
          high)     FILTER=".severity == \"critical\" or .severity == \"high\"" ;;
          medium)   FILTER=".severity == \"critical\" or .severity == \"high\" or .severity == \"medium\"" ;;
          low)      FILTER=".severity == \"critical\" or .severity == \"high\" or .severity == \"medium\" or .severity == \"low\"" ;;
          *)        FILTER="false" ;;
        esac

        # The severity is under security_advisory.severity in the API response
        FAIL_COUNT=$(jq "[.[] | select(.security_advisory | $FILTER)] | length" dependabot-alerts.json 2>/dev/null || echo 0)
        TOTAL_COUNT=$(jq ". | length" dependabot-alerts.json 2>/dev/null || echo 0)

        if [ "$FAIL_COUNT" -gt 0 ]; then
          echo "should_fail=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_fail=false" >> "$GITHUB_OUTPUT"
        fi

        if [ "$TOTAL_COUNT" -gt 0 ]; then
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo -e "### ❌ Dependabot detected $TOTAL_COUNT open alerts\n" > formatted-results.md
          else
            echo -e "### ⚠️ Dependabot detected $TOTAL_COUNT open alerts (informational)\n" > formatted-results.md
          fi
          echo "#### 🔍 Summary of Open Alerts" >> formatted-results.md
          echo "| Package | Severity | Ecosystem | Advisory |" >> formatted-results.md
          echo "| ------- | -------- | --------- | -------- |" >> formatted-results.md
          jq -r '.[] | "| \(.dependency.package.name) | \(.security_advisory.severity) | \(.dependency.package.ecosystem) | [\(.security_advisory.ghsa_id)](\(.security_advisory.html_url)) |"' dependabot-alerts.json >> formatted-results.md

          if [ "$FAIL_COUNT" -gt 0 ]; then
             echo -e "\n**Action failed because $FAIL_COUNT alert(s) meet or exceed the $FAIL_THRESHOLD threshold.**" >> formatted-results.md
          fi
        else
          echo -e "### ✅ No open Dependabot alerts detected" > formatted-results.md
        fi

    - name: Dependabot comment
      if: ${{ inputs.pr_id && inputs.github_token }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        token: ${{ inputs.github_token }}
        issue-number: ${{ inputs.pr_id }}
        body-file: formatted-results.md

    - name: Fail if findings found
      if: ${{ steps.format.outputs.should_fail == 'true' }}
      shell: bash
      env:
        FAIL_THRESHOLD: ${{ inputs.fail_threshold }}
      run: |
        echo "Dependabot alerts found that meet the failure threshold ($FAIL_THRESHOLD). Please review the findings."
        exit 1

    - name: Clean up temporary files
      shell: bash
      run: rm -f dependabot-alerts.json formatted-results.md
